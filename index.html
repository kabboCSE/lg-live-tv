<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kabbo Streamer Pro · Live TV</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f8f9fa;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.97);
      border-bottom: 1px solid #e5e7eb;
      box-shadow: 0 1px 8px rgba(0, 0, 0, 0.08);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-logo h1 {
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }

    .header-logo p {
      font-size: 10px;
      color: #9ca3af;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .now-playing {
      text-align: right;
      display: none;
    }

    .now-playing span {
      display: block;
      font-size: 10px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .now-playing strong {
      font-size: 14px;
      color: #111;
      font-weight: 600;
    }

    /* ── Player Section ── */
    #player-section {
      display: none;
      background: #111;
      padding: 20px 24px 0;
    }

    .player-wrapper {
      max-width: 900px;
      margin: 0 auto;
      border-radius: 16px 16px 0 0;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      background: #000;
    }

    /* Title bar */
    .player-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.97);
      gap: 12px;
      flex-wrap: wrap;
    }

    .player-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .player-logo {
      font-size: 22px;
    }

    .player-name {
      font-weight: 700;
      font-size: 14px;
      color: #111;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-weight: 700;
      color: #059669;
      background: #d1fae5;
      border: 1px solid #6ee7b7;
      padding: 2px 8px;
      border-radius: 100px;
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #10b981;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.3
      }
    }

    .server-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .server-btn {
      padding: 5px 14px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      border: 1px solid #d1d5db;
      cursor: pointer;
      background: #f9fafb;
      color: #6b7280;
      transition: all 0.2s;
    }

    .server-btn.active {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    /* Video */
    .video-area {
      position: relative;
      aspect-ratio: 16/9;
      background: #000;
    }

    #main-video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Spinner */
    .spinner {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.8);
      gap: 12px;
      z-index: 5;
    }

    .spinner-ring {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spinner p {
      color: rgba(255, 255, 255, 0.4);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* Error */
    .error-box {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.85);
      z-index: 5;
    }

    .error-box p {
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .retry-btn {
      padding: 10px 24px;
      border-radius: 100px;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 13px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    /* ── TV-Friendly Controls Bar (ALWAYS VISIBLE, below video) ── */
    .tv-controls {
      background: #1a1a2e;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    /* Big circle buttons for TV remote */
    .tv-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    .tv-btn:hover,
    .tv-btn:focus {
      background: rgba(255, 255, 255, 0.25);
      outline: none;
    }

    .tv-btn:active {
      transform: scale(0.92);
    }

    .tv-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .tv-btn.play-btn {
      width: 60px;
      height: 60px;
      background: rgba(255, 255, 255, 0.18);
    }

    .tv-btn.fs-btn {
      background: #4f46e5;
      border-color: #4f46e5;
    }

    .tv-btn.fs-btn:hover {
      background: #4338ca;
    }

    /* Volume row */
    .vol-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      min-width: 140px;
    }

    .vol-row svg {
      flex-shrink: 0;
    }

    .vol-slider {
      flex: 1;
      cursor: pointer;
      accent-color: #6366f1;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      box-shadow: 0 0 4px rgba(0, 0, 0, 0.3);
    }

    .vol-pct {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      min-width: 34px;
      font-weight: 500;
    }

    /* LIVE + fullscreen row */
    .controls-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .live-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      padding: 4px 10px;
      border-radius: 100px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      font-weight: 600;
    }

    .live-pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ef4444;
      animation: pulse 1.5s infinite;
    }

    /* Info bar */
    .player-infobar {
      display: flex;
      gap: 20px;
      padding: 10px 16px;
      background: #f9fafb;
      border-top: 1px solid #f3f4f6;
      font-size: 11px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .player-infobar span {
      color: #374151;
      font-weight: 600;
    }

    /* ── Category / Channels ── */
    .category {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .category-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 22px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 20px;
    }

    .channel-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 14px;
    }

    @media (max-width: 1100px) {
      .channel-grid {
        grid-template-columns: repeat(5, 1fr);
      }
    }

    @media (max-width: 860px) {
      .channel-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    @media (max-width: 640px) {
      .channel-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 420px) {
      .channel-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .channel-card {
      aspect-ratio: 1/1;
      border-radius: 16px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 12px;
      background: white;
      border: 1.5px solid rgba(0, 0, 0, 0.07);
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .channel-card:hover {
      transform: scale(1.06);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.12);
    }

    .channel-card.selected {
      border: 2px solid #6366f1;
      box-shadow: 0 8px 28px rgba(99, 102, 241, 0.22);
      transform: scale(1.06);
    }

    .card-logo {
      font-size: 36px;
      margin-bottom: 8px;
    }

    .card-name {
      font-size: 11px;
      font-weight: 600;
      color: #374151;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .selected-dot {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6366f1;
      display: none;
      animation: pulse 1.5s infinite;
    }

    .channel-card.selected .selected-dot {
      display: block;
    }

    .section-divider {
      height: 1px;
      background: #e5e7eb;
      margin: 0 24px;
    }

    /* Footer */
    footer {
      background: white;
      border-top: 1px solid #e5e7eb;
      padding: 32px 24px;
      text-align: center;
    }

    footer p {
      color: #9ca3af;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .dev-link {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .dev-photo {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.2), 0 0 0 3px rgba(99, 102, 241, 0.15);
      transition: transform 0.2s;
    }

    .dev-link:hover .dev-photo {
      transform: scale(1.1);
    }

    .dev-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .dev-name {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      transition: color 0.2s;
    }

    .dev-link:hover .dev-name {
      color: #6366f1;
    }

    /* Responsive controls */
    @media (max-width: 520px) {
      .tv-btn {
        width: 44px;
        height: 44px;
      }

      .tv-btn.play-btn {
        width: 50px;
        height: 50px;
      }

      .vol-row {
        min-width: 100px;
      }
    }
  </style>
</head>

<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-logo">
      <span style="font-size:26px">📺</span>
      <div>
        <h1>Kabbo Streamer Pro</h1>
        <p>Live Television</p>
      </div>
    </div>
    <div class="now-playing" id="now-playing">
      <span>Now Playing</span>
      <strong id="now-playing-name"></strong>
    </div>
  </header>

  <!-- ── Player ── -->
  <div id="player-section">
    <div class="player-wrapper">

      <!-- Title bar -->
      <div class="player-titlebar">
        <div class="player-info">
          <span class="player-logo" id="player-logo">📺</span>
          <div>
            <div style="display:flex;align-items:center;gap:8px">
              <span class="player-name" id="player-name">Channel</span>
              <span class="live-badge"><span class="live-dot"></span> LIVE</span>
            </div>
            <p style="font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:1.5px;margin-top:2px">Live
              Player</p>
          </div>
        </div>
        <div class="server-btns" id="server-btns"></div>
      </div>

      <!-- Video -->
      <div class="video-area" id="video-area">
        <video id="main-video" playsinline autoplay crossorigin="anonymous"></video>

        <div class="spinner" id="spinner">
          <div class="spinner-ring"></div>
          <p>লোড হচ্ছে…</p>
        </div>

        <div class="error-box" id="error-box">
          <p id="error-msg">Stream unavailable</p>
          <button class="retry-btn" onclick="retryStream()">Retry</button>
        </div>
      </div>

      <!-- ── TV Controls (ALWAYS VISIBLE) ── -->
      <div class="tv-controls">

        <!-- Prev -->
        <button class="tv-btn" id="btn-prev" onclick="prevChannel()" title="Previous Channel" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
          </svg>
        </button>

        <!-- Play / Pause -->
        <button class="tv-btn play-btn" id="btn-play" onclick="togglePlay()" title="Play / Pause">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" id="play-icon">
            <path d="M8 5v14l11-7z" />
          </svg>
        </button>

        <!-- Next -->
        <button class="tv-btn" id="btn-next" onclick="nextChannel()" title="Next Channel" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z" />
          </svg>
        </button>

        <!-- Volume -->
        <div class="vol-row">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="white" opacity="0.7">
            <path
              d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
          </svg>
          <input type="range" class="vol-slider" id="volume-slider" min="0" max="1" step="0.05" value="0.7"
            oninput="changeVolume(this.value)">
          <span class="vol-pct" id="vol-pct">70%</span>
        </div>

        <!-- Right: LIVE + Fullscreen -->
        <div class="controls-right">
          <span class="live-pill">
            <span class="live-pill-dot"></span> LIVE
          </span>

          <!-- Fullscreen — works on LG TV too -->
          <button class="tv-btn fs-btn" onclick="goFullscreen()" title="Fullscreen">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Info bar -->
      <div class="player-infobar">
        <div>Type <span>HLS / M3U8</span></div>
        <div>Status <span style="color:#059669">Live</span></div>
        <div>Protocol <span>HTTPS</span></div>
      </div>

    </div>
  </div>

  <!-- ── Channel Sections ── -->
  <div id="channels-root"></div>

  <!-- ── Footer ── -->
  <footer>
    <p>&copy; 2026 Kabbo Streamer Pro · Premium Live Television</p>
    <p style="font-size:11px;color:#9ca3af;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Developed by
    </p>

      </div>
      <span class="dev-name">Shahriar Kabbo</span>
    </a>
  </footer>

        { id: 203, name: "DBC News", logo: "🎤", streams: [{ label: "Server 1", url: "https://tvsen6.aynaott.com/dbcnews/index.m3u8?e=1780840187&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=4989815fe78975261c94f5922994e2f3" }] },
        { id: 204, name: "Ekattor TV", logo: "📡", streams: [{ label: "Server 1", url: "https://tvsen6.aynaott.com/ekattorbdtv/index.m3u8?e=1780840188&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=bdb19744e12506ea2c45908715c8be8d" }] },
        { id: 106, name: "Somoy News", logo: "📰", streams: [{ label: "Server 1", url: "https://tvsen6.aynaott.com/somoytv/index.m3u8?e=1780840187&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=6b41334dab0c68f26a15838017f9debe" }] },
        { id: 108, name: "Al Jazeera", logo: "✨", streams: [{ label: "Server 1", url: "https://owrcovcrpy.gpcdn.net/bpk-tv/1721/output/index.m3u8" }] },
      ],
      bangla: [
        { id: 101, name: "BTV National", logo: "📺", streams: [{ label: "Server 1", url: "https://tvsen6.aynaott.com/btvhd/index.m3u8?e=1780840186&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=b048ab27656728c70ec19f6bae2c15fb" }] },
        { id: 102, name: "Channel I", logo: "🎬", streams: [{ label: "Server 1", url: "https://tvsen6.aynaott.com/channeli/index.m3u8?e=1780840186&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=0963302002ec123256badd07c2a88af5" }] },
        { id: 103, name: "NTV", logo: "📡", streams: [{ label: "Server 1", url: "https://tvsen5.aynaott.com/ntvbd/index.m3u8?e=1780840186&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=d538fbd343ccc4f0dc974145aedebd8b" }] },
        { id: 104, name: "RTV", logo: "🎪", streams: [{ label: "Server 1", url: "https://tvsen5.aynaott.com/RtvHD/index.m3u8?e=1780840186&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=5aac0af3cb64c14b2ba5380fc2ad7d8b" }] },
        { id: 105, name: "Bangla Vision", logo: "🎥", streams: [{ label: "Server 1", url: "https://tvsen5.aynaott.com/banglavision/index.m3u8?e=1780840186&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=18e2831ec1279b4ac06e26e45a7a051e" }] },
        { id: 1077, name: "Jamuna TV", logo: "🌿", streams: [{ label: "Server 1", url: "https://tvsen6.aynaott.com/jamunatv/index.m3u8?e=1780840188&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=0b76cbec0e97a2c18d3b49b64cf71355" }] },
        { id: 107, name: "ETV · Bangla", logo: "📻", streams: [{ label: "Server 1", url: "https://tvsen6.aynaott.com/etv/index.m3u8?e=1780840186&u=78be6644-0a65-48ec-81a4-089ac65a2619&token=ad44c536e7551a210c5af605ab4f42b2" }] },
      ]
    };

    const ALL_CHANNELS = [...CHANNELS.sports, ...CHANNELS.news, ...CHANNELS.bangla];
    let currentChannel = null;
    let currentStreamIdx = 0;
    let hlsInstance = null;
    const video = document.getElementById('main-video');

    // ── Render ────────────────────────────────────────────────────────────────────
    function renderChannels() {
      const root = document.getElementById('channels-root');
      const sections = [
        { key: 'sports', title: 'Sports Channels', icon: '🏟️' },
        { key: 'news', title: 'Live News & Info', icon: '📰' },
        { key: 'bangla', title: 'Bangla Entertainment', icon: '🎬' },
      ];
      root.innerHTML = sections.map((s, i) => `
    ${i > 0 ? '<div class="section-divider"></div>' : ''}
    <div class="category">
      <div class="category-title"><span>${s.icon}</span><span>${s.title}</span></div>
      <div class="channel-grid">
        ${CHANNELS[s.key].map(ch => `
          <div class="channel-card" id="card-${ch.id}" onclick="selectChannel(${ch.id})">
            <div class="card-logo">${ch.logo}</div>
            <p class="card-name">${ch.name}</p>
            <span class="selected-dot"></span>
          </div>`).join('')}
      </div>
    </div>`).join('');
    }

    // ── Select Channel ────────────────────────────────────────────────────────────
    function selectChannel(id) {
      const ch = ALL_CHANNELS.find(c => c.id === id);
      if (!ch) return;

      document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('selected'));
      const card = document.getElementById('card-' + id);
      if (card) card.classList.add('selected');

      currentChannel = ch;
      currentStreamIdx = 0;

      document.getElementById('player-section').style.display = 'block';
      document.getElementById('now-playing').style.display = 'block';
      document.getElementById('now-playing-name').textContent = ch.name;
      document.getElementById('player-logo').textContent = ch.logo;
      document.getElementById('player-name').textContent = ch.name;

      renderServerBtns(ch, 0);
      loadStream(ch, 0);
      updateNavBtns();

      setTimeout(() => {
        document.getElementById('player-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 50);
    }

    // ── Server Buttons ────────────────────────────────────────────────────────────
    function renderServerBtns(ch, activeIdx) {
      document.getElementById('server-btns').innerHTML = ch.streams.map((s, i) => `
    <button class="server-btn ${i === activeIdx ? 'active' : ''}" onclick="switchStream(${i})">
      ${i === activeIdx ? '<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#10b981;margin-right:4px;vertical-align:middle"></span>' : ''}
      ${s.label}
    </button>`).join('');
    }

    // ── Load Stream ───────────────────────────────────────────────────────────────
    function loadStream(ch, idx) {
      const url = ch.streams[idx].url;
      showSpinner(true);
      showError(false);

      if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }
      video.src = '';

      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.load();
        video.play().catch(() => { });
        showSpinner(false);
      } else if (window.Hls && Hls.isSupported()) {
        const hls = new Hls({ debug: false, enableWorker: true, lowLatencyMode: true });
        hlsInstance = hls;
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          showSpinner(false);
          video.play().catch(() => { });
        });
        hls.on(Hls.Events.ERROR, (e, data) => {
          if (data.fatal) { showError(true, 'Stream unavailable'); showSpinner(false); }
        });
        hls.loadSource(url);
        hls.attachMedia(video);
      } else {
        showError(true, 'HLS not supported'); showSpinner(false);
      }
    }

    function switchStream(idx) {
      if (!currentChannel) return;
      currentStreamIdx = idx;
      renderServerBtns(currentChannel, idx);
      loadStream(currentChannel, idx);
    }
    function retryStream() {
      if (currentChannel) loadStream(currentChannel, currentStreamIdx);
    }

    // ── Playback Controls ─────────────────────────────────────────────────────────
    function togglePlay() {
      if (!video) return;
      if (video.paused) {
        video.play();
      } else {
        video.pause();
      }
    }

    video.addEventListener('play', () => {
      document.getElementById('play-icon').innerHTML = '<path d="M6 19h4V5H6zm8-14v14h4V5z"/>';
    });
    video.addEventListener('pause', () => {
      document.getElementById('play-icon').innerHTML = '<path d="M8 5v14l11-7z"/>';
    });
    video.addEventListener('waiting', () => showSpinner(true));
    video.addEventListener('canplay', () => showSpinner(false));

    function changeVolume(v) {
      video.volume = parseFloat(v);
      document.getElementById('vol-pct').textContent = Math.round(v * 100) + '%';
    }

    // ── Fullscreen — LG TV compatible ────────────────────────────────────────────
    function goFullscreen() {
      const el = document.getElementById('video-area');
      if (el.requestFullscreen) { el.requestFullscreen(); }
      else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
      else if (el.mozRequestFullScreen) { el.mozRequestFullScreen(); }
      else if (el.msRequestFullscreen) { el.msRequestFullscreen(); }
      else if (video.requestFullscreen) { video.requestFullscreen(); }
      else if (video.webkitRequestFullscreen) { video.webkitRequestFullscreen(); }
      else if (video.webkitEnterFullscreen) { video.webkitEnterFullscreen(); }
    }

    // ── Prev / Next ───────────────────────────────────────────────────────────────
    function prevChannel() {
      const idx = ALL_CHANNELS.findIndex(c => c.id === currentChannel?.id);
      if (idx > 0) selectChannel(ALL_CHANNELS[idx - 1].id);
    }
    function nextChannel() {
      const idx = ALL_CHANNELS.findIndex(c => c.id === currentChannel?.id);
      if (idx < ALL_CHANNELS.length - 1) selectChannel(ALL_CHANNELS[idx + 1].id);
    }
    function updateNavBtns() {
      const idx = ALL_CHANNELS.findIndex(c => c.id === currentChannel?.id);
      document.getElementById('btn-prev').disabled = idx <= 0;
      document.getElementById('btn-next').disabled = idx >= ALL_CHANNELS.length - 1;
    }

    // ── Helpers ───────────────────────────────────────────────────────────────────
    function showSpinner(show) {
      document.getElementById('spinner').style.display = show ? 'flex' : 'none';
    }
    function showError(show, msg) {
      const box = document.getElementById('error-box');
      box.style.display = show ? 'flex' : 'none';
      if (msg) document.getElementById('error-msg').textContent = msg;
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    renderChannels();
  </script>
</body>
